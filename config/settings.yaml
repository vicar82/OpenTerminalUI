app:
  name: "OpenTerminalUI API"
  environment: "local"
  default_exchange_suffix: ".NS"
  # LM Studio hosted Gemma model used for news sentiment & emotion analysis.
  lm_studio_base_url: "http://localhost:1234/v1"
  lm_studio_model: "google/gemma-4-26b-a4b"
  lm_studio_enabled: true
  lm_studio_timeout_seconds: 240.0

data_sources:
  market_data:
    provider: "yfinance"
    fallback_providers:
      - "alpha_vantage"
      - "polygon"
  macro_data:
    provider: "fred"

storage:
  raw_path: "data/raw"
  processed_path: "data/processed"
  cache_path: "data/cache"
